<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Portal - Military Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="system-protection.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Roboto+Mono:wght@300;400;500;700&display=swap');

        * {
            font-family: 'Roboto Mono', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #0a0e0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        .military-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 80%, #2e7d32 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, #1b5e20 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, #3e2723 0%, transparent 50%),
                linear-gradient(45deg, #1b4332 25%, #2d1810 25%, #2d1810 50%, #1b4332 50%, #1b4332 75%, #2d1810 75%);
            background-size: 200px 200px, 200px 200px, 100px 100px;
            background-position: 0 0, 100px 0, 0 0, 50px 50px;
            opacity: 0.3;
        }

        .glassmorphism {
            background: rgba(255, 255, 255, 0.05);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .glassmorphism-hover:hover {
            background: rgba(255, 255, 255, 0.08);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border-color: rgba(0, 255, 0, 0.5);
        }
        
        .military-text {
            color: #4caf50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        
        .military-accent {
            color: #8bc34a;
        }
        
        .tactical-font {
            font-family: 'Russo One', cursive;
        }
        
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
        
        .counter-animation {
            animation: counterPulse 0.6s ease-out;
        }
        
        @keyframes counterPulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        
        .success-flash {
            animation: successFlash 0.8s ease-out;
        }
        
        @keyframes successFlash {
            0% {
                background-color: rgba(76, 175, 80, 0.2);
            }
            50% {
                background-color: rgba(76, 175, 80, 0.4);
            }
            100% {
                background-color: rgba(76, 175, 80, 0.2);
            }
        }
        
        .scanner-line {
            animation: scan 2s linear infinite;
        }
        
        @keyframes scan {
            0% {
                top: 0;
            }
            100% {
                top: 100%;
            }
        }
    </style>
</head>
<body class="military-pattern">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <!-- Logo Section -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-red-600 to-red-500 rounded-full mb-4">
                    <i data-lucide="shield" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-3xl font-bold military-text tactical-font mb-2">Strategic Command Portal</h1>
                <p class="text-gray-400">Authorized Personnel Entry System</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="glassmorphism rounded-xl p-8 space-y-6">
                <!-- Security Level -->
                <div>
                    <label for="accessLevel" class="block text-sm font-medium military-accent mb-2">Security Clearance Level</label>
                    <select id="accessLevel" name="accessLevel" required
                        class="w-full px-4 py-3 bg-green-900/30 border border-green-500/50 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400/50 transition-colors">
                        <option value="">Select clearance level</option>
                        <option value="field">Field Operative</option>
                        <option value="squad">Team Commander</option>
                        <option value="command">Strategic Command</option>
                    </select>
                </div>

                <!-- Personnel ID -->
                <div>
                    <label for="personnelId" class="block text-sm font-medium military-accent mb-2">Personnel Identifier</label>
                    <div class="relative">
                        <input id="personnelId" name="personnelId" type="text" required
                            class="w-full px-4 py-3 bg-green-900/30 border border-green-500/50 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400/50 transition-colors"
                            placeholder="Enter personnel identifier" />
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
                        </div>
                    </div>
                </div>

                <!-- Access Code -->
                <div>
                    <label for="accessCode" class="block text-sm font-medium military-accent mb-2">Secure Access Code</label>
                    <div class="relative">
                        <input id="accessCode" name="accessCode" type="password" required
                            class="w-full px-4 py-3 bg-green-900/30 border border-green-500/50 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400/50 transition-colors"
                            placeholder="Enter secure access code" />
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <button type="button" id="togglePassword" class="text-gray-400 hover:text-green-400" title="Toggle Password Visibility">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Remember Device -->
                <div class="flex items-center">
                    <input type="checkbox" id="rememberDevice" name="rememberDevice" class="mr-2">
                    <label for="rememberDevice" class="text-sm text-gray-400">Trust this device</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full px-6 py-3 bg-gradient-to-r from-green-600 to-green-500 text-white rounded-lg hover:from-green-700 hover:to-green-600 transition-all duration-200 transform hover:scale-105 font-semibold">
                    <span class="flex items-center justify-center">
                        <i data-lucide="log-in" class="w-5 h-5 mr-2"></i>
                        Access System
                    </span>
                </button>

                <!-- Demo Credentials -->
                <div class="mt-6 p-4 bg-green-900/20 rounded-lg border border-green-500/30">
                    <p class="text-sm font-medium military-accent mb-3">Demo Access Credentials:</p>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-gray-400">Field Operative:</span>
                            <span class="text-green-400 font-mono">field001 / alpha123</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">Team Commander:</span>
                            <span class="text-green-400 font-mono">squad001 / bravo456</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">Strategic Command:</span>
                            <span class="text-green-400 font-mono">command001 / charlie789</span>
                        </div>
                    </div>
                </div>
            </form>

            <!-- Security Notice -->
            <div class="mt-6 text-center">
                <p class="text-xs text-gray-500">
                    <i data-lucide="shield-check" class="w-4 h-4 inline mr-1"></i>
                    Secured Connection • Authorized Personnel Only
                </p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const accessCode = document.getElementById('accessCode');
        const eyeIcon = togglePassword.querySelector('i');

        togglePassword.addEventListener('click', () => {
            const type = accessCode.getAttribute('type') === 'password' ? 'text' : 'password';
            accessCode.setAttribute('type', type);
            
            // Update icon
            if (type === 'text') {
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        });

        // Login form submission
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const personnelId = document.getElementById('personnelId').value;
            const accessLevel = document.getElementById('accessLevel').value;
            const accessCode = document.getElementById('accessCode').value;
            const rememberDevice = document.getElementById('rememberDevice').checked;

            // Demo authentication logic
            const validCredentials = [
                { id: 'field001', code: 'alpha123', level: 'field', name: 'Field Operative' },
                { id: 'squad001', code: 'bravo456', level: 'squad', name: 'Team Commander' },
                { id: 'command001', code: 'charlie789', level: 'command', name: 'Strategic Command' }
            ];

            const user = validCredentials.find(cred => cred.id === personnelId && cred.code === accessCode);

            if (user) {
                // Store user session
                const userData = {
                    id: user.id,
                    name: user.name,
                    level: user.level,
                    clearance: accessLevel,
                    deviceTrusted: rememberDevice
                };

                localStorage.setItem('currentUser', JSON.stringify(userData));
                
                // Show success feedback
                loginForm.classList.add('success-flash');
                setTimeout(() => {
                    loginForm.classList.remove('success-flash');
                }, 800);

                // Redirect to main dashboard
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1200);
            } else {
                // Show error feedback
                loginForm.style.animation = 'shake 0.5s';
                setTimeout(() => {
                    loginForm.style.animation = '';
                }, 500);
            }
        });

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);

        // Auto-focus on personnel ID field
        window.addEventListener('load', () => {
            document.getElementById('personnelId').focus();
        });
    </script>
</body>
</html>
